<!DOCTYPE html>
<html lang="en">
<head>
  <title>404 — Lost in the Void | Encore Shao</title>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Work+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
  <style>
    /* ── Design tokens (mirrored from main site) ── */
    :root {
      --bg:          #07091A;
      --bg2:         #0D1228;
      --surface:     #111827;
      --surface2:    #1A2235;
      --border:      rgba(255,255,255,0.07);
      --border2:     rgba(255,255,255,0.13);
      --text:        #E8EDF5;
      --text2:       #94A3B8;
      --muted:       #4E5D73;
      --blue:        #3B82F6;
      --purple:      #8B5CF6;
      --cyan:        #22D3EE;
      --green:       #10B981;
      --r-sm:        8px;
      --r-md:        16px;
      --r-lg:        24px;
    }

    [data-theme="light"] {
      --bg:       #F0F4FF;
      --bg2:      #FFFFFF;
      --surface:  #F8FAFF;
      --surface2: #EEF2FF;
      --border:   rgba(0,0,0,0.08);
      --border2:  rgba(0,0,0,0.13);
      --text:     #0F172A;
      --text2:    #475569;
      --muted:    #94A3B8;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Work Sans', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* ── Canvas code rain ── */
    #code-rain {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Aurora blobs (same as hero) ── */
    .aurora {
      position: fixed;
      inset: 0;
      z-index: 1;
      overflow: hidden;
      pointer-events: none;
    }

    .aurora-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.45;
    }

    .aurora-blob-1 {
      width: 560px; height: 560px;
      background: radial-gradient(circle, rgba(59,130,246,0.5) 0%, transparent 70%);
      top: -150px; left: -100px;
      animation: auroraDrift 14s ease-in-out infinite alternate;
    }

    .aurora-blob-2 {
      width: 440px; height: 440px;
      background: radial-gradient(circle, rgba(139,92,246,0.45) 0%, transparent 70%);
      bottom: -100px; right: -50px;
      animation: auroraDrift 18s ease-in-out infinite alternate-reverse;
    }

    .aurora-blob-3 {
      width: 380px; height: 380px;
      background: radial-gradient(circle, rgba(34,211,238,0.28) 0%, transparent 70%);
      top: 40%; left: 55%;
      animation: auroraDrift 22s ease-in-out infinite alternate;
    }

    @keyframes auroraDrift {
      0%   { transform: translate(0, 0) scale(1); }
      33%  { transform: translate(40px, -30px) scale(1.08); }
      66%  { transform: translate(-20px, 40px) scale(0.95); }
      100% { transform: translate(30px, 20px) scale(1.05); }
    }

    [data-theme="light"] .aurora-blob-1 {
      background: radial-gradient(circle, rgba(59,130,246,0.2) 0%, transparent 70%);
    }
    [data-theme="light"] .aurora-blob-2 {
      background: radial-gradient(circle, rgba(139,92,246,0.16) 0%, transparent 70%);
    }
    [data-theme="light"] .aurora-blob-3 {
      background: radial-gradient(circle, rgba(34,211,238,0.1) 0%, transparent 70%);
    }

    /* ── Floating code fragments ── */
    .fragments {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .fragment {
      position: absolute;
      font-family: 'Fira Code', monospace;
      opacity: 0;
      animation: floatUp linear infinite;
      will-change: transform, opacity;
    }

    @keyframes floatUp {
      0%   { opacity: 0; transform: translateY(0) rotate(0deg); }
      8%   { opacity: 1; }
      85%  { opacity: 0.3; }
      100% { opacity: 0; transform: translateY(-420px) rotate(25deg); }
    }

    /* ── Nav bar ── */
    .top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      height: 60px;
      background: rgba(7,9,26,0.4);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    [data-theme="light"] .top-bar {
      background: rgba(240,244,255,0.6);
    }

    .nav-logo {
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.01em;
    }

    .nav-logo-accent { color: var(--text2); font-weight: 400; }

    .theme-toggle {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--border2);
      background: rgba(255,255,255,0.05);
      color: var(--text2);
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .theme-toggle:hover {
      background: var(--surface2);
      border-color: var(--blue);
      color: var(--blue);
      transform: rotate(20deg);
    }

    [data-theme="light"] .theme-toggle {
      background: rgba(0,0,0,0.04);
      border-color: rgba(0,0,0,0.12);
    }

    /* ── Main content ── */
    .page-wrap {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 80px 24px 24px;
      gap: 0;
    }

    /* ── Eyebrow ── */
    .err-eyebrow {
      font-family: 'Fira Code', monospace;
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .err-eyebrow::before,
    .err-eyebrow::after {
      content: '';
      display: block;
      width: 28px;
      height: 1px;
      background: var(--blue);
      opacity: 0.5;
    }

    /* ── Giant 404 glitch text ── */
    .err-number {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(110px, 20vw, 210px);
      font-weight: 800;
      line-height: 0.95;
      letter-spacing: -0.05em;
      color: var(--text);
      position: relative;
      margin-bottom: 4px;
      user-select: none;
    }

    /* Chromatic aberration ghost layers */
    .err-number::before,
    .err-number::after {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .err-number::before {
      color: var(--cyan);
      animation: glitch-a 5s infinite linear;
      clip-path: polygon(0 0, 100% 0, 100% 42%, 0 42%);
      left: 0; top: 0;
    }

    .err-number::after {
      color: var(--purple);
      animation: glitch-b 5s infinite linear;
      clip-path: polygon(0 58%, 100% 58%, 100% 100%, 0 100%);
      left: 0; top: 0;
    }

    @keyframes glitch-a {
      0%, 87%, 100%  { transform: none; opacity: 0; }
      88%  { transform: translate(-6px, 3px); opacity: 1; }
      89%  { transform: translate(6px, -2px); opacity: 0.8; }
      90%  { transform: translate(-3px, 4px); opacity: 0.9; }
      91%  { transform: translate(4px, -1px); opacity: 0.7; }
      92%  { transform: none; opacity: 0; }
    }

    @keyframes glitch-b {
      0%, 84%, 100%  { transform: none; opacity: 0; }
      85%  { transform: translate(7px, -3px); opacity: 1; }
      86%  { transform: translate(-5px, 2px); opacity: 0.8; }
      87%  { transform: translate(4px, -4px); opacity: 0.9; }
      88%  { transform: none; opacity: 0; }
    }

    /* Horizontal scan line sweep */
    .err-scanline {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 2px,
        rgba(0, 0, 0, 0.07) 2px,
        rgba(0, 0, 0, 0.07) 3px
      );
      pointer-events: none;
    }

    /* ── Terminal card ── */
    .terminal {
      margin-top: 40px;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: var(--r-lg);
      overflow: hidden;
      width: min(540px, 94vw);
      box-shadow:
        0 32px 80px rgba(0, 0, 0, 0.65),
        0 0 0 1px rgba(59, 130, 246, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      animation: terminalIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
      animation-delay: 0.15s;
    }

    @keyframes terminalIn {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to   { opacity: 1; transform: none; }
    }

    [data-theme="light"] .terminal {
      background: var(--bg2);
      box-shadow:
        0 20px 60px rgba(0, 0, 0, 0.12),
        0 0 0 1px rgba(59, 130, 246, 0.1);
    }

    .terminal-bar {
      background: var(--surface2);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 6px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    [data-theme="light"] .terminal-bar {
      background: #E8EEFF;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-red    { background: #FF5F57; }
    .dot-yellow { background: #FEBC2E; }
    .dot-green  { background: #28C840; }

    .terminal-title {
      font-family: 'Fira Code', monospace;
      font-size: 0.68rem;
      color: var(--muted);
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .terminal-body {
      padding: 22px 26px 26px;
    }

    .terminal-line {
      font-family: 'Fira Code', monospace;
      font-size: 0.78rem;
      line-height: 2.1;
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
    }

    .t-prompt  { color: var(--green); flex-shrink: 0; }
    .t-cmd     { color: var(--text); }
    .t-err     { color: #FF6B6B; font-weight: 500; flex-shrink: 0; }
    .t-info    { color: var(--text2); }
    .t-url     { color: var(--cyan); word-break: break-all; }
    .t-comment { color: var(--muted); font-style: italic; }

    .t-cursor {
      display: inline-block;
      width: 7px;
      height: 1.1em;
      background: var(--blue);
      animation: cursorBlink 0.9s step-end infinite;
      vertical-align: middle;
      border-radius: 1px;
    }

    @keyframes cursorBlink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* Divider */
    .terminal-divider {
      margin: 18px 0;
      height: 1px;
      background: var(--border);
    }

    /* Actions row */
    .terminal-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: var(--r-sm);
      padding: 9px 20px;
      font-family: 'Work Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.18s ease;
      text-decoration: none;
      border: 1.5px solid transparent;
      line-height: 1;
      white-space: nowrap;
    }

    .btn-glow {
      background: linear-gradient(135deg, var(--blue) 0%, #6366F1 100%);
      color: #fff;
    }

    .btn-glow:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(59, 130, 246, 0.5);
      color: #fff;
    }

    .btn-ghost {
      background: transparent;
      color: var(--text2);
      border-color: var(--border2);
    }

    .btn-ghost:hover {
      background: var(--surface2);
      color: var(--text);
      border-color: var(--border2);
    }

    /* ── Hint line below terminal ── */
    .err-hint {
      margin-top: 24px;
      font-family: 'Fira Code', monospace;
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .err-hint span {
      color: var(--blue);
      opacity: 0.7;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .err-number { font-size: 96px; }
      .terminal-body { padding: 18px 18px 20px; }
      .terminal-actions { flex-direction: column; }
      .btn { justify-content: center; }
      .top-bar { padding: 0 16px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

  <canvas id="code-rain"></canvas>

  <div class="aurora" aria-hidden="true">
    <div class="aurora-blob aurora-blob-1"></div>
    <div class="aurora-blob aurora-blob-2"></div>
    <div class="aurora-blob aurora-blob-3"></div>
  </div>

  <div class="fragments" id="fragments" aria-hidden="true"></div>

  <!-- Top bar -->
  <header class="top-bar">
    <a href="/" class="nav-logo">Encore<span class="nav-logo-accent"> Shao</span></a>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
      <i class="fa-solid fa-moon"></i>
    </button>
  </header>

  <!-- Main content -->
  <main class="page-wrap">
    <p class="err-eyebrow">Error</p>

    <div class="err-number" data-text="404" aria-label="404">
      404
      <div class="err-scanline" aria-hidden="true"></div>
    </div>

    <div class="terminal" role="region" aria-label="Error details">
      <div class="terminal-bar">
        <span class="dot dot-red" aria-hidden="true"></span>
        <span class="dot dot-yellow" aria-hidden="true"></span>
        <span class="dot dot-green" aria-hidden="true"></span>
        <span class="terminal-title">bash — encore@ranbot:~</span>
      </div>
      <div class="terminal-body">
        <div class="terminal-line">
          <span class="t-prompt">~$</span>
          <span class="t-cmd">curl -I <span class="t-url" id="requestedPath">/</span></span>
        </div>
        <div class="terminal-line">
          <span class="t-err">✗ 404 Not Found</span>
          <span class="t-info">— route lost in the void</span>
        </div>
        <div class="terminal-line">
          <span class="t-comment"># maybe it was moved, renamed, or never existed</span>
        </div>
        <div class="terminal-line">
          <span class="t-prompt">~$</span>
          <span class="t-cursor" aria-hidden="true"></span>
        </div>
        <div class="terminal-divider"></div>
        <div class="terminal-actions">
          <a href="/" class="btn btn-glow">
            <i class="fa-solid fa-house" aria-hidden="true"></i> Go Home
          </a>
          <button class="btn btn-ghost" onclick="history.back()">
            <i class="fa-solid fa-arrow-left" aria-hidden="true"></i> Go Back
          </button>
        </div>
      </div>
    </div>

    <p class="err-hint">
      Looking for something? Try <span><a href="/" style="color: inherit; text-decoration: underline;">icmoc.com</a></span> or <span><a href="https://blog.icmoc.com" target="_blank" rel="noopener" style="color: inherit; text-decoration: underline;">blog.icmoc.com</a></span>
    </p>
  </main>

  <script>
    // ── Theme (syncs with main site via localStorage) ──────────────────
    (function () {
      var btn = document.getElementById('themeToggle');
      var saved = localStorage.getItem('theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var theme = saved || (prefersDark ? 'dark' : 'light');

      function applyTheme(t) {
        document.documentElement.setAttribute('data-theme', t);
        btn.querySelector('i').className = t === 'dark' ? 'fa-solid fa-moon' : 'fa-solid fa-sun';
      }

      applyTheme(theme);

      btn.addEventListener('click', function () {
        theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        localStorage.setItem('theme', theme);
        applyTheme(theme);
      });
    })();

    // ── Show the requested path in terminal ────────────────────────────
    (function () {
      var el = document.getElementById('requestedPath');
      var path = window.location.pathname;
      if (path && path !== '/404.html' && path !== '/404') {
        el.textContent = path;
      } else {
        el.textContent = window.location.href.replace(window.location.origin, '');
      }
    })();

    // ── Matrix code rain canvas ────────────────────────────────────────
    (function () {
      var canvas = document.getElementById('code-rain');
      var ctx = canvas.getContext('2d');
      var chars = '01アイウエオカキクケコ{}[]();=>/<>\\#@!?&|~^0x'.split('');
      var fontSize = 13;
      var cols, drops;
      var isDark = true;

      function getIsDark() {
        return document.documentElement.getAttribute('data-theme') !== 'light';
      }

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        cols = Math.floor(canvas.width / (fontSize + 2));
        drops = Array.from({ length: cols }, function () {
          return Math.random() * -(canvas.height / fontSize);
        });
      }

      resize();
      window.addEventListener('resize', resize);

      function draw() {
        isDark = getIsDark();

        if (isDark) {
          ctx.fillStyle = 'rgba(7, 9, 26, 0.055)';
        } else {
          ctx.fillStyle = 'rgba(240, 244, 255, 0.08)';
        }
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.font = fontSize + 'px "Fira Code", monospace';

        for (var i = 0; i < drops.length; i++) {
          var char = chars[Math.floor(Math.random() * chars.length)];
          var y = drops[i] * fontSize;
          var progress = y / canvas.height;

          if (isDark) {
            if (progress < 0.25) {
              ctx.fillStyle = 'rgba(34, 211, 238, 0.85)';
            } else if (progress < 0.6) {
              ctx.fillStyle = 'rgba(59, 130, 246, 0.5)';
            } else {
              ctx.fillStyle = 'rgba(59, 130, 246, 0.18)';
            }
          } else {
            ctx.fillStyle = 'rgba(59, 130, 246, 0.25)';
          }

          ctx.fillText(char, i * (fontSize + 2), y);

          drops[i] += 0.45;
          if (y > canvas.height && Math.random() > 0.978) {
            drops[i] = Math.random() * -30;
          }
        }
      }

      setInterval(draw, 55);
    })();

    // ── Floating code fragments ────────────────────────────────────────
    (function () {
      var container = document.getElementById('fragments');
      var snippets = ['404', 'null', 'undefined', 'void 0', '!found', 'Error', '???', '∅', '0x404', 'NaN', 'nil', 'missing'];
      var colors = ['var(--blue)', 'var(--cyan)', 'var(--purple)'];

      function spawn() {
        var el = document.createElement('span');
        el.className = 'fragment';
        el.textContent = snippets[Math.floor(Math.random() * snippets.length)];
        el.style.cssText = [
          'left:' + (5 + Math.random() * 88) + '%',
          'bottom:' + (-10 + Math.random() * 15) + '%',
          'font-size:' + (0.55 + Math.random() * 0.45) + 'rem',
          'color:' + colors[Math.floor(Math.random() * colors.length)],
          'animation-duration:' + (7 + Math.random() * 9) + 's',
          'animation-delay:0s'
        ].join(';');
        container.appendChild(el);
        setTimeout(function () { el.remove(); }, 17000);
      }

      // Staggered boot burst
      for (var i = 0; i < 6; i++) {
        setTimeout(spawn, i * 350);
      }
      setInterval(spawn, 1400);
    })();
  </script>

</body>
</html>
